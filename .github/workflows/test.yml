name: Test

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

# Cancel in-progress runs for the same branch / PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/test.yml'
            typescript:
              - 'ui/**/*.ts'
              - 'ui/**/*.tsx'
              - 'ui/package.json'
              - 'ui/bun.lock'
              - 'ui/tsconfig.json'
              - 'ui/tsconfig.*.json'
              - 'ui/vite.config.*'
              - 'ui/vitest.config.*'
              - 'ui/playwright.config.*'
              - 'ui/e2e/**'
              - '.github/workflows/test.yml'

  go:
    name: Go tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: test -z "$(gofmt -s -l $(go list -f '{{.Dir}}' ./...))"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 10m ./...

  e2e:
    name: E2E tests (fake upstream)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build gateway binary
        run: go build -o /tmp/gateway ./cmd/gateway

      - name: Run e2e tests
        run: go test -tags e2e -count=1 -timeout 3m ./e2e/...
        env:
          E2E_GATEWAY_BIN: /tmp/gateway

  e2e-ollama:
    name: E2E tests (Ollama)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build gateway binary
        run: go build -o /tmp/gateway ./cmd/gateway

      - name: Cache Ollama model weights
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          # Bump the suffix to force a fresh pull when you change the model.
          key: ollama-${{ runner.os }}-smollm2-135m-v1

      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            -v "$HOME/.ollama:/root/.ollama" \
            ollama/ollama:0.5.7
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:11434; do sleep 2; done'

      - name: Pull model
        run: docker exec ollama ollama pull smollm2:135m

      - name: Run e2e Ollama tests
        # -run TestOllama: fake-upstream (TestGateway*) tests are already covered
        # by the e2e job running in parallel.
        run: go test -tags 'e2e ollama' -count=1 -run TestOllama -timeout 10m ./e2e/...
        env:
          E2E_GATEWAY_BIN: /tmp/gateway
          OLLAMA_HOST: http://127.0.0.1:11434

  typescript:
    name: TypeScript tests
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Reads the version from package.json "packageManager" field so CI
          # always matches what's declared locally.
          bun-version-file: ui/package.json
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: E2E tests
        run: bun run test:e2e

      - name: Build
        run: bun run build
