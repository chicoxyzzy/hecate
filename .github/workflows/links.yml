name: Links

# Catches broken relative links in agent-guidance files (AGENTS.md, CLAUDE.md,
# ai/**, .cursor/rules/**, nested AGENTS.md / SKILL.md) and the long-form
# product docs in docs/. The Test workflow path-ignores **/*.md, so without
# this dedicated workflow markdown drift would land unchecked. Also runs
# weekly on a schedule to surface external link rot.

on:
  push:
    branches: [master]
    paths:
      - '**/*.md'
      - '**/*.mdc'
      - '.lycheeignore'
      - '.github/workflows/links.yml'
  pull_request:
    branches: [master]
    paths:
      - '**/*.md'
      - '**/*.mdc'
      - '.lycheeignore'
      - '.github/workflows/links.yml'
  # Weekly to surface external link rot without anyone touching the docs.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check markdown links
    runs-on: ubuntu-latest
    # Link failures are informational: a broken external URL or a stale anchor
    # should not block the Test or Build workflows from merging. The lychee
    # summary is still posted to the job so maintainers can act on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --no-progress: cleaner CI logs.
          # --include-fragments: catches broken anchor refs like docs/foo.md#section.
          # --exclude-path .gomodcache: third-party module CLAUDE.md's are not ours to fix.
          # --exclude-path ui/node_modules: same idea for npm package docs.
          # --exclude-path .claude/skills: these are symlinks pointing to ai/skills/.
          #   Lychee resolves relative links from the *symlink* directory, not the
          #   symlink target, so every cross-skill reference appears broken. The
          #   canonical files live under ai/skills/ and are already scanned there.
          # No --base: lychee resolves relative links from each file's own path
          # by default, which is what we want. (Earlier --base . failed because
          # lychee requires --base to be a URL or an absolute path; for local
          # file scans the flag is unnecessary.)
          args: >-
            --no-progress
            --include-fragments
            --exclude-path .gomodcache
            --exclude-path ui/node_modules
            --exclude-path .claude/skills
            './**/*.md'
            './**/*.mdc'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
