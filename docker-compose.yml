# Quickstart stack. Defaults to "just the hecate gateway" so a `docker compose up`
# is enough to try Hecate end-to-end on http://127.0.0.1:8765.
#
# Optional services live behind profiles so they don't start by default:
#   docker compose --profile postgres up    # adds Postgres for state
#   docker compose --profile ollama up      # adds Ollama on :11434
#
# When the hecate image isn't on a registry yet, this builds locally from
# the Dockerfile in the same directory. Once published, the `image:` tag
# below also doubles as the pull target so `docker compose pull` works.

services:
  hecate:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/chicoxyzzy/hecate:latest
    ports:
      - "8765:8765"
    # host.docker.internal resolves to the Docker host on macOS and Windows
    # (Docker Desktop) and on Linux with Docker Desktop ≥ 20.10. The
    # extra_hosts entry below sets it explicitly on Linux where it is not
    # injected automatically.
    #
    # Using host.docker.internal instead of 127.0.0.1 is essential for local
    # inference discovery: from inside a container, 127.0.0.1 is the
    # container's own loopback — not the host — so every /v1/models call
    # would fail with "connection refused" and the UI would show 0 models.
    #
    # When the ollama profile is active the ollama container publishes port
    # 11434 on the host, so host.docker.internal:11434 reaches it via the
    # published port just as well as it would reach a host-native Ollama
    # install. No separate URL is needed for the two cases.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROVIDER_OLLAMA_BASE_URL: "http://host.docker.internal:11434/v1"
      PROVIDER_LMSTUDIO_BASE_URL: "http://host.docker.internal:1234/v1"
      PROVIDER_LLAMACPP_BASE_URL: "http://host.docker.internal:8080/v1"
      PROVIDER_LOCALAI_BASE_URL: "http://host.docker.internal:8080/v1"
    env_file:
      # required:false lets users skip creating .env without breaking
      # `docker compose up`. Compose 2.24+ understands this shape.
      - path: .env
        required: false
    volumes:
      # Persist the bootstrap file (auto-generated encryption key + admin
      # bearer token) and any file-backed control-plane state across
      # restarts. Without this, every `docker compose up` would generate a
      # fresh admin token and invalidate the one a user already pasted into
      # the UI.
      - hecate-data:/data
    restart: unless-stopped

  postgres:
    profiles: ["postgres", "full"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hecate
      POSTGRES_USER: hecate
      POSTGRES_PASSWORD: hecate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hecate -d hecate"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ollama:
    profiles: ["ollama", "full"]
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  hecate-data:
  postgres-data:
  ollama-models:
